name: Scrape Social Media

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: scraper
        run: node index.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}
          FACEBOOK_COOKIES: ${{ secrets.FACEBOOK_COOKIES }}
