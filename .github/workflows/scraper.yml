name: Scrape Social Media

on:
  schedule:
    # 9am and 9pm UK time (BST = UTC+1, so 8:00 and 20:00 UTC)
    # Note: In winter (GMT) this will run at 9am/9pm UTC — adjust to 9,21 Oct-Mar
    - cron: '0 8,20 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Only save posts from the last N hours (0 = no filter)'
        default: '24'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: scraper
        run: node index.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}
          FACEBOOK_COOKIES: ${{ secrets.FACEBOOK_COOKIES }}
          # Manual trigger uses 24h lookback; scheduled runs use 0 (no filter)
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '0' }}
